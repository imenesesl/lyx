name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy all services'
        type: boolean
        default: false
      deploy_ssr:
        description: 'Force deploy SSR (Shell)'
        type: boolean
        default: false
      deploy_admin_ui:
        description: 'Force deploy Admin UI'
        type: boolean
        default: false
      deploy_admin_api:
        description: 'Force deploy Admin API'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION_VALUE: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: >
          pnpm nx run-many -t build
          --projects='@lyx/types,@lyx/sdk,@lyx/registry,@lyx/vite-plugin,@lyx/cli,@lyx/shell,@lyx/admin-api,@lyx/admin-ui'

      - name: Lint framework packages
        run: >
          pnpm nx run-many -t lint
          --projects='@lyx/types,@lyx/sdk,@lyx/registry,@lyx/vite-plugin,@lyx/cli,@lyx/shell'

      - name: Test admin-api
        run: pnpm nx run @lyx/admin-api:test

      - name: Test shell
        run: pnpm nx run @lyx/shell:test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (Admin UI + Shell)
        run: pnpm test:e2e
        env:
          ADMIN_URL: ${{ vars.ADMIN_URL || '' }}
          SHELL_URL: ${{ vars.SHELL_URL || '' }}
        if: vars.ADMIN_URL != '' && vars.SHELL_URL != ''

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build-and-test]
    runs-on: ubuntu-latest
    outputs:
      admin_api: ${{ steps.decide.outputs.admin_api }}
      admin_ui: ${{ steps.decide.outputs.admin_ui }}
      ssr: ${{ steps.decide.outputs.ssr }}
      any_deploy: ${{ steps.decide.outputs.any_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Decide what to deploy
        id: decide
        run: |
          deploy_all() {
            echo "$1"
            echo "admin_api=true" >> $GITHUB_OUTPUT
            echo "admin_ui=true" >> $GITHUB_OUTPUT
            echo "ssr=true" >> $GITHUB_OUTPUT
            echo "any_deploy=true" >> $GITHUB_OUTPUT
            exit 0
          }

          # 1) Manual trigger with individual selections
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force_deploy }}" = "true" ]; then
              deploy_all "Manual trigger — force deploying everything"
            fi

            api="${{ inputs.deploy_admin_api }}"
            ui="${{ inputs.deploy_admin_ui }}"
            ssr="${{ inputs.deploy_ssr }}"

            if [ "$api" = "true" ] || [ "$ui" = "true" ] || [ "$ssr" = "true" ]; then
              echo "Manual trigger — selective deploy: api=$api ui=$ui ssr=$ssr"
              echo "admin_api=$api" >> $GITHUB_OUTPUT
              echo "admin_ui=$ui" >> $GITHUB_OUTPUT
              echo "ssr=$ssr" >> $GITHUB_OUTPUT
              echo "any_deploy=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            deploy_all "Manual trigger (no selection) — deploying everything"
          fi

          # 2) Check if App Runner services exist; if not → deploy all
          SVC_COUNT=$(aws apprunner list-services --region "${{ env.AWS_REGION_VALUE }}" \
            --query "length(ServiceSummaryList[?starts_with(ServiceName,'lyx-production')])" \
            --output text 2>/dev/null || echo "0")

          if [ "$SVC_COUNT" = "0" ] || [ "$SVC_COUNT" = "None" ]; then
            deploy_all "No services found — first deploy, deploying everything"
          fi

          if [ "$SVC_COUNT" -lt 3 ] 2>/dev/null; then
            deploy_all "Only $SVC_COUNT/3 services found — deploying everything"
          fi

          # 3) First commit → deploy all
          COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          if [ "$COMMIT_COUNT" -le 1 ]; then
            deploy_all "First commit — deploying everything"
          fi

          # 4) Check changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            deploy_all "Could not diff — deploying everything"
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Changes to CI/scripts/docker → deploy all
          if echo "$CHANGED" | grep -qE '^(\.github/|scripts/|docker-compose|Dockerfile)'; then
            deploy_all "Infrastructure/CI files changed — deploying everything"
          fi

          admin_api=false
          admin_ui=false
          ssr=false

          if echo "$CHANGED" | grep -qE '^platform/admin-api/'; then admin_api=true; fi
          if echo "$CHANGED" | grep -qE '^platform/admin-ui/'; then admin_ui=true; fi
          if echo "$CHANGED" | grep -qE '^(platform/ssr/|packages/shell/|packages/sdk/|packages/types/)'; then ssr=true; fi

          any_deploy=false
          if [ "$admin_api" = "true" ] || [ "$admin_ui" = "true" ] || [ "$ssr" = "true" ]; then
            any_deploy=true
          fi

          echo "admin_api=$admin_api" >> $GITHUB_OUTPUT
          echo "admin_ui=$admin_ui" >> $GITHUB_OUTPUT
          echo "ssr=$ssr" >> $GITHUB_OUTPUT
          echo "any_deploy=$any_deploy" >> $GITHUB_OUTPUT
          echo "Deploy: api=$admin_api ui=$admin_ui ssr=$ssr"

  setup-infra:
    if: needs.detect-changes.outputs.any_deploy == 'true'
    needs: [detect-changes]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Ensure infrastructure exists
        run: bash scripts/ensure-infra.sh

  deploy-admin-api:
    if: needs.detect-changes.outputs.admin_api == 'true'
    needs: [detect-changes, setup-infra]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          ECR: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${ECR}/lyx-production/admin-api:${GITHUB_SHA::8}"
          docker build -t "$IMAGE" -f platform/admin-api/Dockerfile platform/admin-api/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy admin-api
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REGION: ${{ env.AWS_REGION_VALUE }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="lyx-bundles-${ACCOUNT_ID}-production"

          ENV_VARS=$(jq -nc \
            --arg mongo "$MONGO_URI" \
            --arg jwt "$JWT_SECRET" \
            --arg bucket "$BUCKET" \
            --arg region "$REGION" \
            '{
              NODE_ENV: "production",
              PORT: "4000",
              MONGO_URI: $mongo,
              S3_BUCKET: $bucket,
              JWT_SECRET: $jwt,
              CORS_ORIGIN: "*",
              AWS_REGION: $region
            }')

          bash scripts/ensure-service.sh \
            "lyx-production-admin-api" \
            "$IMAGE" \
            "4000" \
            "$ENV_VARS" \
            "true"

          echo "✅ admin-api deployed"

  deploy-admin-ui:
    if: >-
      always() &&
      needs.detect-changes.outputs.admin_ui == 'true' &&
      needs.setup-infra.result == 'success' &&
      (needs.deploy-admin-api.result == 'success' || needs.deploy-admin-api.result == 'skipped')
    needs: [detect-changes, setup-infra, deploy-admin-api]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          ECR: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${ECR}/lyx-production/admin-ui:${GITHUB_SHA::8}"
          docker build -t "$IMAGE" -f platform/admin-ui/Dockerfile.apprunner platform/admin-ui/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy admin-ui
        env:
          REGION: ${{ env.AWS_REGION_VALUE }}
        run: |
          API_URL=$(aws apprunner list-services --region "$REGION" \
            --query "ServiceSummaryList[?contains(ServiceName,'admin-api')].ServiceUrl" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            API_URL="placeholder.example.com"
            echo "⚠️  admin-api not found yet, using placeholder"
          fi

          ENV_VARS=$(jq -nc --arg api "https://${API_URL}" '{API_URL: $api}')

          bash scripts/ensure-service.sh \
            "lyx-production-admin-ui" \
            "$IMAGE" \
            "4001" \
            "$ENV_VARS" \
            "false"

          echo "✅ admin-ui deployed"

  deploy-ssr:
    if: >-
      always() &&
      needs.detect-changes.outputs.ssr == 'true' &&
      needs.setup-infra.result == 'success' &&
      (needs.deploy-admin-api.result == 'success' || needs.deploy-admin-api.result == 'skipped')
    needs: [detect-changes, setup-infra, deploy-admin-api]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          ECR: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${ECR}/lyx-production/ssr:${GITHUB_SHA::8}"
          docker build -t "$IMAGE" -f platform/ssr/Dockerfile .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy SSR
        env:
          REGION: ${{ env.AWS_REGION_VALUE }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="lyx-bundles-${ACCOUNT_ID}-production"

          API_URL=$(aws apprunner list-services --region "$REGION" \
            --query "ServiceSummaryList[?contains(ServiceName,'admin-api')].ServiceUrl" \
            --output text 2>/dev/null || echo "")

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            API_URL="placeholder.example.com"
            echo "⚠️  admin-api not found yet, using placeholder"
          fi

          ENV_VARS=$(jq -nc \
            --arg api "https://${API_URL}" \
            --arg bucket "$BUCKET" \
            --arg region "$REGION" \
            '{
              API_URL: $api,
              PORT: "4002",
              S3_BUCKET: $bucket,
              AWS_REGION: $region
            }')

          bash scripts/ensure-service.sh \
            "lyx-production-ssr" \
            "$IMAGE" \
            "4002" \
            "$ENV_VARS" \
            "true"

          echo "✅ ssr deployed"

  show-urls:
    if: always() && needs.detect-changes.outputs.any_deploy == 'true'
    needs: [detect-changes, deploy-admin-api, deploy-admin-ui, deploy-ssr]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VALUE }}

      - name: Show service URLs
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "  Lyx Services"
          echo "═══════════════════════════════════════"
          aws apprunner list-services --region "${{ env.AWS_REGION_VALUE }}" \
            --query "ServiceSummaryList[?starts_with(ServiceName,'lyx')].[ServiceName,Status,ServiceUrl]" \
            --output table

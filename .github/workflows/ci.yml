name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build framework packages
        run: >
          pnpm nx run-many -t build
          --projects='@lyx/types,@lyx/sdk,@lyx/registry,@lyx/vite-plugin,@lyx/cli,@lyx/shell,@lyx/admin-api,@lyx/admin-ui'

      - name: Lint framework packages
        run: >
          pnpm nx run-many -t lint
          --projects='@lyx/types,@lyx/sdk,@lyx/registry,@lyx/vite-plugin,@lyx/cli,@lyx/shell'

      - name: Test admin-api
        run: pnpm nx run @lyx/admin-api:test

      - name: Test shell
        run: pnpm nx run @lyx/shell:test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build admin-api image
        run: docker build -f platform/admin-api/Dockerfile platform/admin-api/

      - name: Build admin-ui image
        run: docker build -f platform/admin-ui/Dockerfile platform/admin-ui/

      - name: Build SSR image
        run: docker build -f platform/ssr/Dockerfile .

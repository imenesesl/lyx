services:
  nginx:
    build:
      context: ..
      dockerfile: platform/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      admin-api:
        condition: service_healthy
      admin-ui:
        condition: service_started
      ssr:
        condition: service_healthy
    networks:
      - lyx-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  ssr:
    build:
      context: ..
      dockerfile: platform/ssr/Dockerfile
    env_file:
      - .env
    environment:
      API_URL: http://admin-api:4000
      PORT: 4002
      S3_BUCKET: ${S3_BUCKET:-lyx-bundles}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: ${MONGO_URI}
      S3_BUCKET: ${S3_BUCKET:-lyx-bundles}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      PORT: 4000
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    networks:
      - lyx-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  lyx-network:
    driver: bridge

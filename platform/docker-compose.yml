services:
  nginx:
    build:
      context: ..
      dockerfile: platform/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      admin-api:
        condition: service_healthy
      admin-ui:
        condition: service_started
      ssr:
        condition: service_healthy
    networks:
      - lyx-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  ssr:
    build:
      context: ..
      dockerfile: platform/ssr/Dockerfile
    environment:
      API_URL: http://admin-api:4000
      PORT: 4002
    depends_on:
      admin-api:
        condition: service_healthy
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-}
    volumes:
      - mongo-data:/data/db
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-lyxadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-lyxsecret}
    volumes:
      - minio-data:/data
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/lyx}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-lyxadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-lyxsecret}
      MINIO_BUCKET: ${MINIO_BUCKET:-lyx-bundles}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: 4000
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - lyx-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    networks:
      - lyx-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  mongo-data:
  minio-data:

networks:
  lyx-network:
    driver: bridge
